<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Denied</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #ff0000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
  }
  
  /* LOGIN PAGE */
  #loginPage {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: radial-gradient(circle, #1a0000 0%, #000 70%);
    animation: flicker 0.15s infinite alternate;
  }
  
  @keyframes flicker {
    0% { opacity: 1; }
    100% { opacity: 0.95; }
  }
  
  .login-box {
    background: rgba(20, 0, 0, 0.8);
    border: 1px solid #ff0000;
    padding: 40px;
    width: 350px;
    box-shadow: 0 0 20px #ff0000, inset 0 0 20px #330000;
    position: relative;
  }
  
  .login-box::before {
    content: "SYSTEM BREACH";
    position: absolute;
    top: -25px;
    left: 0;
    color: #ff0000;
    font-size: 12px;
    letter-spacing: 3px;
    animation: glitch 1s infinite;
  }
  
  @keyframes glitch {
    0%, 100% { text-shadow: 2px 0 #00ffff, -2px 0 #ff00ff; }
    50% { text-shadow: -2px 0 #00ffff, 2px 0 #ff00ff; }
  }
  
  h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 24px;
    text-shadow: 0 0 10px #ff0000;
  }
  
  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: #0a0000;
    border: 1px solid #660000;
    color: #ff0000;
    font-family: inherit;
    outline: none;
  }
  
  input:focus {
    border-color: #ff0000;
    box-shadow: 0 0 8px #ff0000;
  }
  
  button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #330000;
    border: 1px solid #ff0000;
    color: #ff0000;
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
    letter-spacing: 2px;
  }
  
  button:hover {
    background: #ff0000;
    color: #000;
    box-shadow: 0 0 15px #ff0000;
  }
  
  #error {
    color: #ff0000;
    text-align: center;
    margin-top: 15px;
    height: 20px;
    font-size: 12px;
  }
  
  /* DASHBOARD */
  #dashboard {
    display: none;
    padding: 40px;
    height: 100vh;
    background: repeating-linear-gradient(
      0deg,
      #0a0000,
      #0a0000 2px,
      #000 2px,
      #000 4px
    );
  }
  
  .header {
    border-bottom: 1px solid #ff0000;
    padding-bottom: 20px;
    margin-bottom: 30px;
  }
  
  .header h2 {
    animation: glitch 2s infinite;
  }
  
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
  }
  
  .card {
    border: 1px solid #660000;
    padding: 20px;
    background: rgba(50, 0, 0, 0.3);
    cursor: pointer;
    transition: 0.2s;
  }
  
  .card:hover {
    border-color: #ff0000;
    background: rgba(80, 0, 0, 0.5);
    box-shadow: 0 0 15px #ff0000;
    transform: translateY(-3px);
  }
  
  .card h3 { margin-bottom: 10px; }
  .card p { font-size: 12px; color: #aa0000; }
  
  #log {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #000;
    border-top: 1px solid #ff0000;
    padding: 10px;
    font-size: 11px;
    max-height: 120px;
    overflow-y: auto;
  }
  
  .logout {
    position: absolute;
    top: 40px;
    right: 40px;
    padding: 8px 15px;
    width: auto;
  }
</style>
</head><audio id="typeSound" src="https://assets.mixkit.co/sfx/preview/mixkit-typewriter-soft-click-1125.mp3"></audio>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-box">
    <h1>PANEL REMOT VIP MIEL</h1>
    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">CLICK, GUNAKAN DENGAN BIJAK FOLLOW ON OWN MIEL</button>
    <div id="error"></div>
  </div>
</div>

<!-- DASHBOARD SETELAH LOGIN -->
<div id="dashboard">
  <button class="logout" onclick="logout()"></button>
  <div class="header">
    <h2>AKSES PANEL REMOT</h2>
    <p>User: OWNER MIEL | Status: ON</p>
  </div>
  
  <div class="grid">
    <div class="card" onclick="addLog('Accessing:status aktif')">
      <h3>BADAN HEADSHOOT (RAWAN)</h3>
      <p>gunakan saat bermain cs selama 1 match</p>
    </div>
    <div class="card" onclick="addLog('Deploying: akses drag hs remot.exe')">
      <h3>DRAG HS 100%</h3>
      <p>Status: ANTI BAND</p>
    </div>
    <div class="card" onclick="addLog('Warning: BY MIEL')">
      <h3>NECK HS (RAWAN)</h3>
      <p>AMAN TAPI RAWAN</p>
    </div>
    <div class="card" onclick="addLog('Error: statys auto on')">
      <h3>AUTO CONTROL HS</h3>
      <p>gunakan dengan bijak oke.</p>
    </div>
  </div>
  
  <div id="log">> System initialized...<br></div>
</div>

<script>
  // LOGIN LOGIC
  function login() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const error = document.getElementById('error');
    
    if (user === 'admin miel panel' && pass === 'miel ganteng') {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      addLog('> Login successful. Welcome back.');
    } else {
      error.textContent = 'ACCESS DENIED - WRONG CREDENTIALS';
      document.querySelector('.login-box').style.animation = 'glitch 0.3s';
      setTimeout(() => {
        document.querySelector('.login-box').style.animation = '';
        error.textContent = '';
      }, 2000);
    }
  }
  
  function logout() {
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('log').innerHTML = '> System initialized...<br>';
  }
  
  // DASHBOARD INTERAKSI
  function addLog(text) {
    const log = document.getElementById('log');
    log.innerHTML += text + '<br>';
    log.scrollTop = log.scrollHeight;
  }
  
  // Enter key buat login
  document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') {
      login();
    }
  });
</script>

</body>
</html>
